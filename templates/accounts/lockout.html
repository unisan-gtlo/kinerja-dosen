{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Akun Dikunci — SIKD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .lock-card {
      background: white; border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      padding: 40px; max-width: 420px; width: 100%;
      text-align: center;
    }
    .lock-icon {
      font-size: 64px; color: #dc3545; margin-bottom: 16px;
    }
    h2 { color: #1e3a5f !important; font-weight: 700; }
    p { color: #666 !important; }
  </style>
</head>
<body>
<div class="lock-card">
  <div class="lock-icon">🔒</div>
  <h2>Akun Sementara Dikunci</h2>
  <p>Terlalu banyak percobaan login yang gagal.</p>
  <p>Akun Anda dikunci selama <strong>1 jam</strong>.</p>
  <p class="mt-3" style="font-size:13px; color:#999 !important">
    Jika Anda membutuhkan bantuan, hubungi administrator sistem.
  </p>
  <a href="/accounts/login/" class="btn mt-3"
     style="background:#1e3a5f; color:white; border-radius:10px; padding:10px 24px">
    Kembali ke Login
  </a>
</div>
</body>
</html>
