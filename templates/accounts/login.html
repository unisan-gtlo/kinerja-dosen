{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SIKD Unichsan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
  <style>
    body { background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%); min-height: 100vh; }
    .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #2d6a9f; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            {% if logo_exists %}
            <img src="{% static 'img/logo.png' %}" class="login-logo mb-3" alt="Logo">
            {% else %}
            <div class="mb-3" style="font-size:48px">🏛️</div>
            {% endif %}
            <h2 class="fw-bold text-dark mb-1">SIKD</h2>
            <p class="text-muted mb-0" style="font-size:13px">Sistem Informasi Kinerja Dosen</p>
            <p class="text-muted" style="font-size:12px">Universitas Ichsan Gorontalo</p>
          </div>

          {% if form.errors %}
          <div class="alert alert-danger alert-sm">
            <span class="ti ti-alert-circle me-1"></span>
            Username atau password salah.
          </div>
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control form-control-lg"
                     placeholder="Masukkan username" autofocus required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control form-control-lg"
                     placeholder="Masukkan password" required>
            </div>
            <div class="mb-3">
              <label class="form-check">
                <input type="checkbox" class="form-check-input">
                <span class="form-check-label text-muted">Ingat saya</span>
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              <span class="ti ti-login me-1"></span>Masuk
            </button>
          </form>
        </div>
      </div>
      <div class="text-center mt-3 text-white" style="font-size:12px; opacity:0.7">
        © 2025 Universitas Ichsan Gorontalo
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
</body>
</html>
